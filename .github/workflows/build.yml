name: Build macOS

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-26-intel
            artifact: file_transfer-x86_64.dmg
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: file_transfer-aarch64.dmg
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (Tauri)
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_SKIP_CODESIGNING: "true"

      - name: Ad-hoc sign and repack DMG
        run: |
          app=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" | head -1)
          echo "Signing: $app"
          codesign --force --deep --sign - "$app"

          volname="file_transfer"
          tmpdir=$(mktemp -d)
          cp -R "$app" "$tmpdir/"

          dmg_root="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          mkdir -p "$dmg_root"
          dmg_path="$dmg_root/$volname.dmg"
          rm -f "$dmg_path"

          brew install create-dmg

          create-dmg \
            --volname "file_transfer" \
            --window-pos 100 100 \
            --window-size 520 360 \
            --icon-size 96 \
            --icon "file_transfer.app" 120 200 \
            --app-drop-link 400 200 \
            "$dmg_path" \
            "$tmpdir/" 2>&1

          rm -rf "$tmpdir"
          echo "DMG_PATH=$dmg_path" >> $GITHUB_ENV

      - name: Rename DMG
        run: |
          cp "${{ env.DMG_PATH }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Upload to Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dmg
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
